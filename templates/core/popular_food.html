{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
<h2 class="mb-4">Food Items</h2>
<div class="row">
{% for food in foods %}
<div class="col-md-3 mb-4">
<div class="card shadow-sm">

{% if food.image %}
<img src="{{ food.image.url }}" class="card-img-top">
{% else %}
<img src="/static/images/default_food.jpg" class="card-img-top">
{% endif %}

<div class="card-body text-center">
<h5>{{ food.name }}</h5>
<p>₹{{ food.selling_price }}</p>
<a href="{% url 'customers:add_to_cart' food.id %}"
class="btn btn-primary w-100">
Add to Cart
</a>
</div>
</div>
</div>
{% endfor %}
</div>
</div>

{% endblock %}
