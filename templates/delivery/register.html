{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
<h2>Delivery Partner Registration 🛵</h2>

<form method="POST">
{% csrf_token %}

<input class="form-control mb-3" name="first_name" placeholder="First Name" required>
<input class="form-control mb-3" name="last_name" placeholder="Last Name" required>
<input class="form-control mb-3" name="email" placeholder="Email" required>
<input class="form-control mb-3" name="phone" placeholder="Phone" required>

<input type="password" class="form-control mb-3" name="password" placeholder="Password" required>
<input type="password" class="form-control mb-3" name="confirm_password" placeholder="Confirm Password" required>

<button class="btn btn-primary">Register as Delivery Partner</button>
</form>
</div>
{% endblock %}
