{% extends 'base.html' %}

{% block title %}Customer Login - Lovemeal{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-header text-white text-center py-4" style="background: linear-gradient(135deg, #E07B39 0%, #d16829 100%);">
                    <h3 class="mb-0"><i class="fas fa-sign-in-alt"></i> Customer Login</h3>
                    <p class="mb-0">Welcome back to Lovemeal!</p>
                </div>
                <div class="card-body p-5">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control form-control-lg" name="email" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control form-control-lg" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>

                        <div class="text-center">
                            <p class="mb-0">Don't have an account? <a href="/customers/register/" class="text-decoration-none fw-bold" style="color: #E07B39;">Register here</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
